<div class="horario-config">
  <div class="horario-model">
    <div class="horario-header">
      <h2>Nuevo rango de horario</h2>
      <button (click)="close()">
        <span class="material-symbols-outlined"> close </span>
      </button>
    </div>
    <div class="horario-dia">
      <h3>{{ diasSemana[dia.diaSemana] }}</h3>
    </div>
    <div class="horario-inputs" [formGroup]="form">
      <div class="horario-campo">
        <label for="start-time">Hora de inicio:</label>
        <input formControlName="desde" type="time" id="start-time" name="start-time" />
      </div>
      <div class="horario-campo">
        <label for="end-time">Hora de fin:</label>
        <input formControlName="hasta" type="time" id="end-time" name="end-time" />
      </div>
    </div>
    <div class="horario-buttons">
      <button (click)="close()" class="cancel-btn">Cancelar</button>
      <button (click)="save()" class="save-btn">Guardar</button>
    </div>
  </div>
</div>
